# Release workflow. The NuGet version in Directory.Build.props and the npm version in the Angular
# library package.json are kept in lockstep; a pushed v* tag must match both, but tags do not drive
# the number.
#
# Tagged releases are public: NuGet packages go to NuGet.org through Trusted Publishing (GitHub
# OIDC -> short-lived API key), and the Angular package goes to npm (`next` for a pre-release,
# `latest` for a stable release). Pre-release NuGet packages are also mirrored to GitHub Packages.
# workflow_dispatch remains a private preview build: it packs and smoke-tests everything, then
# pushes a pre-release to GitHub Packages only.
#
# Triggers: push a v* tag (e.g. v10.0.0-preview.1 or v10.0.0) or use workflow_dispatch. For churny
# pre-release builds prefer workflow_dispatch: no tag, no draft Release - just bump <Version> in
# Directory.Build.props, run, and the packages land in GitHub Packages.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required by softprops/action-gh-release to create a draft Release
      packages: write # Required to push pre-release NuGet packages to GitHub Packages
      id-token: write # NuGet Trusted Publishing and npm provenance for tagged public releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.302'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: angular/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag, NuGet, and npm version lockstep
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          $version = & ./.github/scripts/verify-version-lockstep.ps1 -Tag $env:RELEASE_TAG
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Determine release channel
        id: channel
        shell: bash
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          if [[ "$VERSION" == *-* ]]; then
            echo "channel=prerelease" >> "$GITHUB_OUTPUT"
            echo "npm-tag=next" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION is a pre-release."
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION is stable."
          fi

      - name: Restore
        run: dotnet restore Dignite.Abp.FileStoring.slnx

      - name: Block vulnerable NuGet dependencies
        shell: bash
        run: |
          set -o pipefail
          report="$(dotnet list Dignite.Abp.FileStoring.slnx package --vulnerable --include-transitive)"
          printf '%s\n' "$report"
          # Advisories with no remediation available yet (upstream-controlled). These are
          # transitive dependencies of ABP 10.5.0 / EF Core with either no patched release or
          # a patch that is incompatible with the pinned framework. Re-check on every ABP/EF
          # bump and remove an entry once a compatible fix ships.
          #   GHSA-rvv3-g6hj-g44x  AutoMapper 14.0.0 (via Volo.Abp.AutoMapper) - patched only in
          #                        15.1.1, a major bump incompatible with ABP 10.5.0.
          #   GHSA-2m69-gcr7-jv3q  SQLitePCLRaw.lib.e_sqlite3 2.1.11 (via Microsoft.EntityFrameworkCore.Sqlite)
          #                        - no patched release exists.
          allowlist='GHSA-rvv3-g6hj-g44x|GHSA-2m69-gcr7-jv3q'
          if printf '%s\n' "$report" | grep -Ev "$allowlist" | grep -Eiq '^\s*>\s+[^[:space:]]+\s+[^[:space:]]+\s+(high|critical)\b'; then
            echo "::error::High or critical NuGet vulnerabilities (outside the documented allowlist) block the release."
            exit 1
          fi

      # Includes host/Dignite.FileExplorer.Web.Host (the local dev/demo host) - it opts out of
      # central package management in common.props since it pins its own inline package versions.
      # No -warnaserror here: the repo intentionally sets TreatWarningsAsErrors=false and the CI
      # build matches, so warnings stay visible without blocking a release.
      - name: Build
        run: dotnet build Dignite.Abp.FileStoring.slnx --no-restore --configuration Release

      - name: Run FileStoring (core) tests
        run: dotnet test core/test/Dignite.Abp.FileStoring.Tests/Dignite.Abp.FileStoring.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run FileStoring Imaging (core) tests
        run: dotnet test core/test/Dignite.Abp.FileStoring.Imaging.Tests/Dignite.Abp.FileStoring.Imaging.Tests.csproj --no-build --configuration Release --verbosity normal

      # Dignite.FileExplorer.TestBase is shared test infrastructure (no runner) - it is exercised
      # indirectly via the projects below, never run directly.
      - name: Run FileExplorer (domain) tests
        run: dotnet test file-explorer/test/Dignite.FileExplorer.Domain.Tests/Dignite.FileExplorer.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run FileExplorer (EF Core) tests
        run: dotnet test file-explorer/test/Dignite.FileExplorer.EntityFrameworkCore.Tests/Dignite.FileExplorer.EntityFrameworkCore.Tests.csproj --no-build --configuration Release --verbosity normal

      # MongoDB provider - starts an embedded mongod via MongoSandbox (MongoSandbox8.runtime.linux-x64
      # is pinned in Directory.Packages.props and resolves fine on this runner); no external
      # MongoDB install needed.
      - name: Run FileExplorer (MongoDB) tests
        run: dotnet test file-explorer/test/Dignite.FileExplorer.MongoDB.Tests/Dignite.FileExplorer.MongoDB.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run FileExplorer (application) tests
        run: dotnet test file-explorer/test/Dignite.FileExplorer.Application.Tests/Dignite.FileExplorer.Application.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run authorization denial tests
        run: dotnet test file-explorer/test/Dignite.FileExplorer.Authorization.Tests/Dignite.FileExplorer.Authorization.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run directory safety tests
        run: dotnet test file-explorer/test/Dignite.FileExplorer.DirectorySafety.Tests/Dignite.FileExplorer.DirectorySafety.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run update authorization tests
        run: dotnet test file-explorer/test/Dignite.FileExplorer.Update.Tests/Dignite.FileExplorer.Update.Tests.csproj --no-build --configuration Release --verbosity normal

      # Projects with IsPackable=false (host/Dignite.FileExplorer.Web.Host and the FileStoring
      # test project) are skipped automatically. Only the 10 packable projects under core/src and
      # file-explorer/src are produced.
      - name: Pack NuGet packages
        run: dotnet pack Dignite.Abp.FileStoring.slnx --no-build --configuration Release -o ./artifacts

      - name: Smoke-test packed NuGet packages
        shell: pwsh
        run: ./.github/scripts/smoke-test-nuget-packages.ps1 ./artifacts '${{ steps.version.outputs.version }}'

      - name: Install Angular dependencies
        working-directory: angular
        run: npm ci --legacy-peer-deps

      - name: Audit Angular dependencies
        working-directory: angular
        run: npm audit --audit-level=moderate

      - name: Lint Angular projects
        working-directory: angular
        run: npm run lint -- --max-warnings=0

      - name: Run Angular unit tests
        working-directory: angular
        run: npm test -- --watch=false

      - name: Build Angular library
        working-directory: angular
        run: npm run build:lib

      - name: Build Angular demo
        working-directory: angular
        run: npm run build:prod

      - name: Pack Angular library
        shell: pwsh
        working-directory: angular
        run: |
          New-Item -ItemType Directory -Force ../artifacts/npm | Out-Null
          npm pack ./dist/file-explorer --pack-destination ../artifacts/npm
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Smoke-test packed Angular library
        shell: pwsh
        run: |
          $tarballs = @(Get-ChildItem ./artifacts/npm/*.tgz)
          if ($tarballs.Count -ne 1) {
            throw "Expected one Angular package tarball, found $($tarballs.Count)."
          }
          node ./.github/scripts/smoke-test-angular-package.mjs $tarballs[0].FullName '${{ steps.version.outputs.version }}'

      - name: Migrate host database for HTTP E2E smoke test
        run: dotnet run --project host/Dignite.FileExplorer.Web.Host/Dignite.FileExplorer.Web.Host.csproj --no-build --configuration Release -- --migrate-database

      - name: Start host for HTTP E2E smoke test
        shell: bash
        run: |
          nohup dotnet run --project host/Dignite.FileExplorer.Web.Host/Dignite.FileExplorer.Web.Host.csproj --no-build --configuration Release -- --urls http://127.0.0.1:5000 > host-e2e.log 2>&1 &
          echo $! > host-e2e.pid
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5000/health-status > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat host-e2e.log
          exit 1

      - name: Run HTTP E2E and proxy smoke test
        env:
          FILE_EXPLORER_BASE_URL: http://127.0.0.1:5000
        run: node ./.github/scripts/smoke-test-file-explorer-http.mjs

      - name: Stop host after HTTP E2E smoke test
        if: always()
        shell: bash
        run: |
          if [ -f host-e2e.pid ]; then
            kill "$(cat host-e2e.pid)" || true
          fi

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
            artifacts/npm/*.tgz
          if-no-files-found: error

      # Keep the existing authenticated GitHub Packages preview feed for every pre-release trigger.
      - name: Push to GitHub Packages (pre-release)
        if: steps.channel.outputs.channel == 'prerelease'
        run: |
          for package in ./artifacts/*.nupkg; do
            [[ "$package" == *.snupkg ]] && continue
            dotnet nuget push "$package" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --source https://nuget.pkg.github.com/dignite-projects/index.json \
              --skip-duplicate
          done

      - name: Validate NuGet Trusted Publishing identity
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          if [ -z "$NUGET_USER" ]; then
            echo "::error::The NUGET_USER repository variable is required for Trusted Publishing."
            exit 1
          fi

      - name: Sign in to NuGet.org with Trusted Publishing
        if: startsWith(github.ref, 'refs/tags/v')
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push tagged release to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          for package in ./artifacts/*.nupkg; do
            [[ "$package" == *.snupkg ]] && continue
            dotnet nuget push "$package" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish tagged Angular package to npm
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is required for a tagged public release."
            exit 1
          fi
          npm publish ./artifacts/npm/*.tgz \
            --access public \
            --tag '${{ steps.channel.outputs.npm-tag }}' \
            --provenance

      # Extract this version's section from CHANGELOG.md as the draft release body.
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]") > 0) found = 1; next }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::CHANGELOG.md has no section for $VERSION; the draft release body will be empty - fill it in before publishing."
          fi

      # Draft only, on tag pushes (workflow_dispatch has no tag context) - review before publishing.
      - name: Create draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ steps.channel.outputs.channel == 'prerelease' }}
          body_path: release-notes.md
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
            artifacts/npm/*.tgz
