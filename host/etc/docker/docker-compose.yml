services:
  host-web:
    image: dignite.fileexplorer.web/host-web:latest
    container_name: host-web
    build:
      context: ../../../
      dockerfile: angular/Dockerfile.local      
    ports:
      - "4200:80"
    depends_on:
      - host-api
    volumes:
      - ./dynamic-env.json://usr/share/nginx/html/dynamic-env.json
    networks:
      - abp-network  

  host-api:
    image: dignite.fileexplorer.web/host-api:latest
    container_name: host-api-container
    build:
      context: ../../
      dockerfile: Dignite.FileExplorer.Web.Host/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=91f91912-5ab0-49df-8166-23377efaf3cc
      - App__SelfUrl=https://localhost:44390
      - App__HealthCheckUrl=http://host-api:8080/health-status
      - AuthServer__Authority=http://host-api:8080
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__SetSelfAsIssuer=true 
      - ConnectionStrings__Default=DataSource=/data/Host.db
    ports:
      - "44390:8081"
    depends_on:
      sqlite:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    restart: on-failure    
    volumes:
      - sqlite_data:/data
      - ./certs:/app/certs
      - data_protection_keys:/app/data-protection-keys
    networks:
      - abp-network  
  
  db-migrator:
    image: dignite.fileexplorer.web/host-api:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: Dignite.FileExplorer.Web.Host/Dockerfile.local
    environment:
      - ConnectionStrings__Default=DataSource=/data/Host.db
    command:
      - --migrate-database
    depends_on:
      sqlite:
        condition: service_healthy
    volumes:
      - sqlite_data:/data
    networks:
      - abp-network
  sqlite:
    container_name: sqlite-container
    image: alpine:latest
    command: sh -c "apk add sqlite && touch /data/Host.db && sqlite3 /data/Host.db '.databases' && tail -f /dev/null"
    environment:
      - TZ=UTC
    volumes:
      - sqlite_data:/data
    networks:
      - abp-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /data/Host.db ]; then exit 0; else exit 1; fi"]
      interval: 10s
      timeout: 3s
      retries: 10
volumes:
  sqlite_data:
    name: host_sqlite_data
  data_protection_keys:
    name: host_data_protection_keys
networks:
  abp-network:
    name: host-network
    driver: bridge
